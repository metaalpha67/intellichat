<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Admin Login – Informatik-Lernbot</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: system-ui, sans-serif; background: #f5f5f0; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
  .card { background: #fff; border: 1px solid #e5e5e0; border-radius: 12px; padding: 2rem; width: 100%; max-width: 380px; }
  h1 { font-size: 18px; font-weight: 600; margin-bottom: 0.25rem; }
  p.sub { font-size: 13px; color: #737370; margin-bottom: 1.5rem; }
  label { font-size: 13px; font-weight: 500; display: block; margin-bottom: 0.4rem; }
  input[type=password] { width: 100%; padding: 0.65rem 1rem; font-size: 14px; border: 1px solid #d4d4d0; border-radius: 8px; outline: none; margin-bottom: 1rem; }
  input[type=password]:focus { border-color: #3b82f6; box-shadow: 0 0 0 3px rgba(59,130,246,0.15); }
  button { width: 100%; padding: 0.65rem; font-size: 14px; font-weight: 500; background: #1a1a1a; color: #fff; border: none; border-radius: 8px; cursor: pointer; }
  button:hover { background: #333; }
  .fehler { background: #fee2e2; color: #991b1b; border-radius: 8px; padding: 0.6rem 1rem; font-size: 13px; margin-bottom: 1rem; }
</style>
</head>
<body>
<div class="card">
  <h1>🔐 Admin-Login</h1>
  <p class="sub">Nur für Lehrkräfte</p>
  {% if fehler %}
  <div class="fehler">{{ fehler }}</div>
  {% endif %}
  <form method="POST">
    <label>Passwort</label>
    <input type="password" name="passwort" placeholder="Passwort eingeben..." autofocus />
    <button type="submit">Einloggen</button>
  </form>
</div>
</body>
</html>
